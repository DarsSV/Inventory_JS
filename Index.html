<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory System</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h2 { margin-bottom: 10px; }
        
        .form-group { margin-bottom: 10px; }
        label { display: inline-block; width: 70px; font-size: 18px; }
        input[type="text"], input[type="number"] { padding: 5px; width: 150px; }
        
        #submitBtn { 
            margin: 10px 0; 
            padding: 5px 25px; 
            font-size: 18px; 
            cursor: pointer; 
        }

        .view-section { margin-top: 20px; font-size: 16px; }
        
        table { 
            border-collapse: collapse; 
            width: 300px; 
            margin-top: 10px; 
            display: none; /* Hidden by default per checkbox */
        }
        
        th, td { 
            border: 1px solid black; 
            padding: 8px; 
            text-align: left; 
        }
        
        th { background-color: #f2f2f2; }
        
        /* Style for the inline edit input */
        .edit-input {
            width: 90%;
            padding: 2px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2>Inventory System</h2>

    <div class="form-group">
        <label>Item:</label>
        <input type="text" id="itemName">
    </div>
    <div class="form-group">
        <label>Quantity:</label>
        <input type="number" id="itemQty">
    </div>

    <button id="submitBtn" onclick="addItem()">Submit</button>

    <div class="view-section">
        <span>View table (Check the box)</span>
        <input type="checkbox" id="toggleTable" onclick="toggleVisibility()">
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th style="width: 50%;">Item</th>
                <th style="width: 50%;">Quantity</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <p style="font-size: 12px; color: #666; margin-top: 15px;">
        * Double-click on a Quantity cell to edit.
    </p>

    <script>
        // Toggle table visibility
        function toggleVisibility() {
            var table = document.getElementById("inventoryTable");
            var checkbox = document.getElementById("toggleTable");
            table.style.display = checkbox.checked ? "table" : "none";
        }

        // Add item to table
        function addItem() {
            var name = document.getElementById("itemName").value;
            var qty = document.getElementById("itemQty").value;

            if (name === "" || qty === "") {
                alert("Please fill in both fields");
                return;
            }

            var tbody = document.getElementById("tableBody");
            var row = tbody.insertRow();

            var cell1 = row.insertCell(0);
            var cell2 = row.insertCell(1);

            cell1.innerHTML = name;
            cell2.innerHTML = qty;

            // Add Double-Click event to the Quantity cell
            cell2.ondblclick = function() {
                makeEditable(this);
            };

            // Clear inputs
            document.getElementById("itemName").value = "";
            document.getElementById("itemQty").value = "";
        }

        // Feature: Modify quantity on double click
        function makeEditable(cell) {
            // Prevent multiple inputs if already editing
            if (cell.getElementsByTagName('input').length > 0) return;

            var currentVal = cell.innerHTML;
            cell.innerHTML = ""; // Clear cell

            var input = document.createElement("input");
            input.type = "number";
            input.value = currentVal;
            input.className = "edit-input";

            // When user clicks away or presses Enter, save the value
            input.onblur = function() {
                saveValue(cell, this.value);
            };

            input.onkeydown = function(event) {
                if (event.key === "Enter") {
                    saveValue(cell, this.value);
                }
            };

            cell.appendChild(input);
            input.focus();
        }

        function saveValue(cell, newVal) {
            cell.innerHTML = newVal;
        }
    </script>

</body>
</html>
